function App() {
  const [selectedIncident, setSelectedIncident] = useState('');
  const [formData, setFormData] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [errors, setErrors] = useState({});

  const incident = useMemo(
    () => INCIDENT_CATALOG.find(i => i.value === selectedIncident),
    [selectedIncident]
  );

  const update = (field, value) => {
    setFormData(p => ({ ...p, [field]: value }));
    if (errors[field]) setErrors(p => ({ ...p, [field]: null }));
  };

  const reset = () => {
    setSelectedIncident('');
    setFormData({});
    setSubmitted(false);
    setErrors({});
  };

  const validate = () => {
    const required = ['vesselName', 'imo', 'vesselType', 'masterName', 'cso', 'csoEmail', 'eventDate', 'eventTime', 'description'];
    const next = {};
    required.forEach(f => {
      if (!formData[f] || String(formData[f]).trim() === '') next[f] = 'This field is required.';
    });
    setErrors(next);
    return Object.keys(next).length === 0;
  };

  const handleSubmit = () => {
    if (!validate()) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
    const subject = `[RMI Security] ${incident.label} \u2014 ${(formData.vesselName || 'UNKNOWN').toUpperCase()} (IMO ${formData.imo || 'N/A'})`;
    const body = buildEmailBody(incident, formData);
    const mailto = `mailto:${MARSEC_EMAIL}?cc=${DUTY_OFFICER_EMAIL}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = mailto;
    setSubmitted(true);
  };

  return (
    <div style={{ fontFamily: FONT, background: WHITE, color: TEXT, minHeight: '100vh', fontSize: 15, lineHeight: 1.65 }}>
      <Header />
      <Hero />
      <SectionDropdowns />
      <main style={{ maxWidth: 980, margin: '0 auto', padding: '6px 28px 60px' }}>
        <Breadcrumb />
        {submitted ? (
          <SuccessContent onReset={reset} incident={incident} formData={formData} />
        ) : (
          <PortalContent
            selectedIncident={selectedIncident}
            setSelectedIncident={(v) => { setSelectedIncident(v); setFormData({}); setErrors({}); }}
            incident={incident}
            formData={formData}
            update={update}
            errors={errors}
            onSubmit={handleSubmit}
          />
        )}
      </main>
      <Footer />
    </div>
  );
}

function PortalContent({ selectedIncident, setSelectedIncident, incident, formData, update, errors, onSubmit }) {
  return (
    <>
      <H3>About the Reporting Portal</H3>
      <P>
        Pursuant to <A href="https://www.register-iri.com/maritime/maritime-security/" target="_blank" rel="noopener noreferrer">Marine Notice 6-036-1</A>, <em>Maritime Security Incident Notification and Reporting</em>, companies must immediately (within 24 hours) report the occurrence of maritime security incidents involving RMI-flagged vessels to the Republic of the Marshall Islands (RMI) Maritime Administrator (the "Administrator"). This portal provides direct online access to the MI-109 series of incident report forms. Submissions are transmitted to <A href={`mailto:${MARSEC_EMAIL}`}>{MARSEC_EMAIL}</A> with the RMI Duty Officer copied.
      </P>
      <P>
        Completion of a report through this portal does not constitute an admission of liability of any kind. The portal is designed with the limitations of ships' internet connections in mind. If connection is lost during entry, the browser will retain entered data and the report may be submitted when connection is restored. For initial reporting assistance email <A href={`mailto:${MARSEC_EMAIL}`}>{MARSEC_EMAIL}</A>.
      </P>
      <P style={{ color: TEXT_LITE, fontSize: 14 }}>
        Note – All starred (<span style={{ color: ORANGE }}>*</span>) fields are mandatory.
      </P>

      <Divider />

      <H3>Select Incident Type</H3>
      <P>
        Choose the maritime security incident category below. The portal will load the appropriate fields from RMI Form <em>MI-109-2</em>, <em>MI-109-3</em>, <em>MI-109-5</em>, or <em>MI-109-6</em>.
      </P>
      <IncidentDropdown value={selectedIncident} onChange={setSelectedIncident} />

      {incident && incident.form === 'MI-109-5' ? (
        <CyberRedirect />
      ) : incident ? (
        <FormBody incident={incident} formData={formData} update={update} errors={errors} onSubmit={onSubmit} />
      ) : null}
    </>
  );
}

function AuthoritiesList({ formData, update }) {
  const toggle = v => {
    const cur = formData.authorities || [];
    update('authorities', cur.includes(v) ? cur.filter(a => a !== v) : [...cur, v]);
  };
  return (
    <ul style={{ listStyle: 'none', padding: 0, margin: '12px 0 18px' }}>
      {REGIONAL_AUTHORITIES.map(a => {
        const checked = (formData.authorities || []).includes(a.value);
        return (
          <li key={a.value} style={{ marginBottom: 8 }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 15, cursor: 'pointer' }}>
              <span style={{ display: 'inline-block', width: 6, height: 6, borderRadius: '50%', background: TEXT, flexShrink: 0 }} />
              <input type="checkbox" checked={checked} onChange={() => toggle(a.value)} style={{ accentColor: ORANGE }} />
              <span style={{ color: TEXT, fontStyle: 'italic' }}>{a.label}</span>
            </label>
          </li>
        );
      })}
    </ul>
  );
}

}

function H3({ children }) {

}

function Divider() { return <hr style={{ border: 'none', borderTop: `1px solid ${RULE}`, margin: '34px 0 8px' }} />; }

function mainSelectStyle() {

function primaryButton() {

}

function buildEmailBody(incident, d) {
  const auths = (d.authorities || []).map(a => {
    const f = REGIONAL_AUTHORITIES.find(x => x.value === a);
    return f ? f.label : a;
  }).join('; ');

  const lines = [
    'RMI MARITIME ADMINISTRATOR \u2014 SECURITY INCIDENT REPORT',
    `Form: ${incident.form}`,
    `Incident Type: ${incident.label}`,
    'Reference: Marine Notice 6-036-1',
    '',
    '=== 1.0  VESSEL AND VOYAGE ===',
    `Vessel Name: ${(d.vesselName || '').toUpperCase()}`,
    `IMO Number: ${d.imo || ''}`,
    `Vessel Type: ${d.vesselType || ''}`,
    `Cargo: ${d.cargo || ''}`,
    `Crew on Board: ${d.crewCount || ''}`,
    `Passengers on Board: ${d.paxCount || ''}`,
    `Voyage From: ${d.voyageFrom || ''}`,
    `Voyage To / Current Port: ${d.voyageTo || ''}`,
    '',
    '=== 2.0  EVENT DETAILS ===',
    `Date (UTC): ${d.eventDate || ''}`,
    `Time (UTC): ${d.eventTime || ''}`,
    `Local Time Zone: ${d.timeZone || ''}`,
    `Latitude: ${d.latitude || ''}`,
    `Longitude: ${d.longitude || ''}`,
    `Coastal State: ${d.coastalState || ''}`,
    '',
    'Description:',
    d.description || '',
    ''
  ];

  if (incident.category === 'attack') {
    lines.push(
      '=== 3.0  ATTACK PARTICULARS ===',
      `Type of Boarding/Engagement: ${d.boardingType || ''}`,
      `Location of Boarding: ${d.boardingLocation || ''}`,
      `Own Vessel Speed (kts): ${d.ownSpeed || ''}`,
      `Freeboard (m): ${d.freeboard || ''}`,
      `Number of Attackers: ${d.attackerCount || ''}`,
      `Weapons Observed: ${d.weaponsObserved || ''}`,
      `Weapons Used: ${d.weaponsUsed || ''}`,
      `Casualties: ${d.casualties || ''}`,
      `Material Damage: ${d.damage || ''}`,
      `BMP-MS Status: ${d.bmpMs || ''}`,
      `PCASP Embarked: ${d.pcasp || ''}`,
      `Citadel Used: ${d.citadel || ''}`,
      ''
    );
  }
  if (incident.value === 'stowaways') {
    lines.push(
      '=== 3.0  STOWAWAY PARTICULARS ===',
      `Number of Stowaways: ${d.stowawayCount || ''}`,
      `Date of Discovery: ${d.discoveryDate || ''}`,
      `Port of Embarkation: ${d.portOfEmbarkation || ''}`,
      `Date of Embarkation: ${d.embarkDate || ''}`,
      `Hiding Place: ${d.hidingPlace || ''}`,
      `Method of Boarding: ${d.stowawayMethod || ''}`,
      `Expected Port of Disembarkation: ${d.disembarkPort || ''}`,
      `Asylum Requested: ${d.asylum || ''}`,
      '',
      'Stowaway Details:',
      d.stowawayDetails || '',
      '',
      'Coastal / Port State Notifications:',
      d.coastalNotified || '',
      ''
    );
  }
  if (incident.value === 'contraband') {
    lines.push(
      '=== 3.0  CONTRABAND PARTICULARS ===',
      `Type: ${d.contrabandType || ''}`,
      `Quantity / Value: ${d.contrabandQuantity || ''}`,
      `Location Onboard: ${d.contrabandLocation || ''}`,
      `Method of Concealment: ${d.concealmentMethod || ''}`,
      `Discovery Method: ${d.discoveryMethod || ''}`,
      `Crew Involvement Suspected: ${d.crewInvolved || ''}`,
      `Law Enforcement Contacted: ${d.leContacted || ''}`,
      ''
    );
  }
  if (incident.value === 'activism' || incident.value === 'suspicious') {
    lines.push(
      '=== 3.0  INCIDENT PARTICULARS ===',
      `Number of Persons/Vessels Involved: ${d.partyCount || ''}`,
      `Mode of Approach/Activity: ${d.modeOfApproach || ''}`,
      `Outcome: ${d.outcome || ''}`,
      `Operational Impact: ${d.opImpact || ''}`,
      ''
    );
  }

  lines.push(
    '=== 4.0  AUTHORITIES NOTIFIED ===',
    auths || '(none indicated)',
    '',
    '=== 5.0  CONTACT DETAILS ===',
    `Master: ${d.masterName || ''}`,
    `Master Contact: ${d.masterContact || ''}`,
    `Company Security Officer: ${d.cso || ''}`,
    `CSO Email: ${d.csoEmail || ''}`,
    `CSO Phone (24-hr): ${d.csoPhone || ''}`,
    `Company / Operator: ${d.companyName || ''}`,
    `Prepared By: ${d.preparedBy || ''}`,
    `Role: ${d.preparerRole || ''}`,
    '',
    '--',
    'This report was submitted via the RMI Security Incident Reporting Portal.',
    'Per MN 6-036-1 \u00a72.3, the Administrator will transmit this report to the IMO and the IMB Piracy Reporting Centre as required.'
  );

  return lines.join('\n');
}
